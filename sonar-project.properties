# Configuracion de SonarCloud para turismo-poc
#
# Pasos para activar el analisis (a realizar por el usuario):
#   1. Crear una cuenta/organizacion en https://sonarcloud.io vinculada a este repositorio de GitHub.
#   2. Crear el proyecto en SonarCloud y ajustar `sonar.projectKey` y `sonar.organization`
#      abajo para que coincidan con los valores generados por SonarCloud.
#   3. Generar un SONAR_TOKEN (My Account > Security) y agregarlo como GitHub Secret
#      del repositorio con el nombre SONAR_TOKEN.
#   4. El job "sonarcloud" del workflow .github/workflows/ci-cd.yml ejecutara el analisis
#      automaticamente en cada push/PR a main, usando los reportes de cobertura de
#      JaCoCo (backend) y de Vitest/lcov (frontend).

sonar.projectKey=robertcsm22_turismo-poc
sonar.organization=robertcsm22

sonar.projectName=Turismo PoC
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src/tests
sonar.exclusions=frontend/src/i18n/**,frontend/src/locales/**,frontend/src/assets/**

sonar.java.binaries=backend/target/classes
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

sonar.sourceEncoding=UTF-8
